<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itens</title>
</head>

<body>
    <header>
        <div class="container"></div>
    </header>
    <main>
        <section>
            <h2>Itens</h2>

            <!-- tabela pegada pela class-->

            <!-- Criar um item -->
            <form action="../index.php?save=insert" method="post">
                <label for="">Nome</label>
                <input type="text" name="item_name" id="name" maxlength="100" placeholder="Digite o nome do item">

                <label for="">Preço</label>
                <input type="number" name="item_price" id="price" placeholder="Digite o preço do item">

                <button type="submit">Cadastrar item</button>
            </form>
        </section>
    </main>

</body>

</html>
